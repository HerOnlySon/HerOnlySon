services:
  db:
    image: postgres:16-alpine
    container_name: cardoc-db
    environment:
      POSTGRES_DB: cardoc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cardoc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cardoc-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/cardoc
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-key-change-this-secret-key
      JWT_EXPIRATION_MS: 86400000
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
    container_name: cardoc-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres-data: