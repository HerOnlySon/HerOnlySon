<div class="app-shell">
  <div class="route-loader" [class.visible]="isRouteLoading">
    <span></span>
  </div>

  <header class="topbar">
    <div class="brand">
      <p class="eyebrow">CarDoc</p>
      <h1>Smart Vehicle Companion</h1>
    </div>

    <nav>
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
      >
        {{ item.label }}
      </a>
      <a *ngIf="!auth.isLoggedIn()" [routerLink]="'/signin'" routerLinkActive="active">Sign In</a>
      <a *ngIf="!auth.isLoggedIn()" [routerLink]="'/signup'" routerLinkActive="active">Sign Up</a>
      <button *ngIf="auth.isLoggedIn()" type="button" (click)="logout()">Logout</button>
    </nav>
  </header>

  <main [@routeFade]="prepareRoute(outlet)">
    <router-outlet #outlet="outlet"></router-outlet>
  </main>

  <footer>
    <small>Prototype mode: simulated telemetry feed every 5 seconds.</small>
  </footer>
</div>
