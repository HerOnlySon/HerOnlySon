<section class="auth-page animate-in">
  <article class="panel">
    <p class="eyebrow">Create Account</p>
    <h1>Sign Up</h1>
    <p>Create your CarDoc account to track maintenance timing and insurance recommendations.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Full Name
        <input type="text" formControlName="name" placeholder="Thabo Nkosi" />
      </label>

      <label>
        Email
        <input type="email" formControlName="email" placeholder="you@example.com" />
      </label>

      <label>
        Password
        <input type="password" formControlName="password" placeholder="At least 6 characters" />
      </label>

      <button type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Creating account...' : 'Create Account' }}</button>
      <p class="error" *ngIf="error">{{ error }}</p>
    </form>
  </article>
</section>
